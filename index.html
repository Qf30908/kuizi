<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kuiz Administrativ</title>
  <link rel="stylesheet" href="style.css" />
  
</head>
<body>
  <main class="quiz-wrapper">

    <section id="partSelector" class="part-selector">
      <h1>Kuiz Administrativ</h1>
      <h2>Zgjidh pjesën e kuizit</h2>

      <button onclick="startPart(1, 120, 'Pjesa I')">Pjesa I: 1-119</button>
      <button onclick="startPart(121, 241, 'Pjesa II')">Pjesa II: 120-240</button>
      <button onclick="startPart(242, 337, 'Pjesa III')">Pjesa III: 241-336</button>
      <button onclick="startPart(338, 411, 'Pjesa IV')">Pjesa IV: 337-410</button>
      <button onclick="startPart(412, 578, 'Pjesa V')">Pjesa V: 411-577</button>
      <button onclick="startAll()">Të gjitha pyetjet</button>
    </section>

    <section class="quiz-card hidden">
      <div class="top-row">
        <div>
          <h1 id="quizTitle">Kuiz Administrativ</h1>
          <p id="questionCounter">Pyetja 1 / 1</p>
        </div>

        <div class="score-box">
          <span>Score</span>
          <strong id="liveScore">0</strong>
        </div>
      </div>

      <div class="progress-container">
        <div id="progressBar" class="progress-bar"></div>
      </div>

      <h2 id="questionText">Zgjidh një pjesë për të filluar.</h2>

      <div id="answers" class="answers"></div>

      <p id="feedback" class="feedback"></p>

      <div class="nav-buttons">
        <button id="prevBtn" class="btn secondary-btn">⬅ Mbrapa</button>
        <button id="nextBtn" class="btn" disabled>Tjetra ➡</button>
      </div>
    </section>

    <section id="resultCard" class="quiz-card result-card hidden">
      <h1>Rezultati final</h1>
      <div class="final-score" id="finalScore">0 / 0</div>
      <p id="finalMessage"></p>
      <button id="restartBtn" class="btn">Rifillo kuizin</button>
    </section>

  </main>

  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>

<button id="homeBtn" class="home-btn" onclick="location.href='index.html'">
  🏠 Home
</button>

</html>
